<!doctype html>
<html>
<head>
  <meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Mobile Proof Capture</title>
  <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="/static/css/mobile_qr_capture.css" />
</head>
<body class='container py-4' data-token='{{ token }}'>
  <h3>Borrow Proof Capture</h3>
  <p>Transaction: <strong>{{ transaction_id }}</strong></p>
  <video id='video' autoplay playsinline class='w-100 border rounded mb-2'></video>
  <canvas id='canvas' class='d-none'></canvas>
  <button id='captureBtn' class='btn btn-primary'>Capture & Upload (Bypass gallery)</button>

  <script src="/static/js/mobile_qr_capture.js"></script>
</body>
</html>
