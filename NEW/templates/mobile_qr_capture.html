<!doctype html>
<html><head>
  <meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Mobile Proof Capture</title>
  <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'>
</head>
<body class='container py-4'>
  <h3>Borrow Proof Capture</h3>
  <p>Transaction: <strong>{{ transaction_id }}</strong></p>
  <video id='video' autoplay playsinline class='w-100 border rounded mb-2'></video>
  <canvas id='canvas' class='d-none'></canvas>
  <button class='btn btn-primary' onclick='capture()'>Capture & Upload (Bypass gallery)</button>

<script>
const token = '{{ token }}';
async function boot(){
  const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode:'environment'}, audio:false});
  document.getElementById('video').srcObject = stream;
}
async function capture(){
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d'); ctx.drawImage(video,0,0);
  const image_data = canvas.toDataURL('image/jpeg',0.85);
  const resp = await fetch(`/api/mobile/upload-proof/${token}`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({image_data})});
  const data = await resp.json();
  alert(data.success ? `Uploaded to server path: ${data.path}` : data.message);
}
boot();
</script>
</body></html>
