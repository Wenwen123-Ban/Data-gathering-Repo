<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LBAS Student User Management Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/student_portal.css" />
</head>
<body class="bg-light">
<div class="container py-4">
  <h2 class="portal-title">Student User Management Portal (Old Layout + Reservations List)</h2>
  <p class="text-muted mb-4">JSON-only simulation mode with sync pops and notifications.</p>
  <div id="toastArea" class="position-fixed top-0 end-0 p-3" style="z-index: 2000"></div>

  <div class="row">
    <div class="col-lg-8">
      <div class="card mb-3"><div class="card-body">
        <h5>Reservations List</h5>
        <table class="table" id="reservationTable"><thead><tr><th>Tx</th><th>Book</th><th>Reserved Date</th><th>Approved By</th><th>Actions</th></tr></thead><tbody></tbody></table>
      </div></div>
    </div>
    <div class="col-lg-4">
      <div class="card"><div class="card-body">
        <h5>Real-time Notification Area</h5>
        <ul id="notifList" class="list-group"></ul>
      </div></div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/student_portal.js"></script>
</body>
</html>
