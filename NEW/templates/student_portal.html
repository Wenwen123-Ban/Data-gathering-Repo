<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LBAS Student User Management Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
<div class="container py-4">
  <h2>Student User Management Portal (Old Layout + Reservations List)</h2>
  <p class="text-muted mb-4">JSON-only simulation mode with sync pops and notifications.</p>
  <div id="toastArea" class="position-fixed top-0 end-0 p-3" style="z-index: 2000"></div>

  <div class="row">
    <div class="col-lg-8">
      <div class="card mb-3"><div class="card-body">
        <h5>Reservations List</h5>
        <table class="table" id="reservationTable"><thead><tr><th>Tx</th><th>Book</th><th>Reserved Date</th><th>Approved By</th><th>Actions</th></tr></thead><tbody></tbody></table>
      </div></div>
    </div>
    <div class="col-lg-4">
      <div class="card"><div class="card-body">
        <h5>Real-time Notification Area</h5>
        <ul id="notifList" class="list-group"></ul>
      </div></div>
    </div>
  </div>
</div>
<script>
const STUDENT_ID = 'stu-001';

function syncToast(message){
  const id = `t-${Date.now()}`;
  const html = `<div id="${id}" class="toast align-items-center text-bg-primary border-0" role="alert"><div class="d-flex"><div class="toast-body">🔄 Sync: ${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`;
  document.getElementById('toastArea').insertAdjacentHTML('beforeend', html);
  new bootstrap.Toast(document.getElementById(id)).show();
}

async function loadReservations(){
  const txs = await fetch('/api/transactions').then(r=>r.json());
  const body = document.querySelector('#reservationTable tbody');
  body.innerHTML = '';
  txs.filter(t=>t.student_id===STUDENT_ID && ['reserved','approved'].includes((t.status||'').toLowerCase())).forEach(t=>{
    body.insertAdjacentHTML('beforeend', `<tr>
      <td>${t.transaction_id}</td>
      <td>${t.book_id}</td>
      <td>${t.reservation_date}</td>
      <td>${t.approval_admin_id||'-'}</td>
      <td>
        <button class="btn btn-sm btn-outline-danger" onclick="cancelReservation('${t.transaction_id}')">Cancel</button>
        <button class="btn btn-sm btn-outline-primary" onclick="extendReservation('${t.transaction_id}')">Extend</button>
      </td>
    </tr>`)
  });
}

async function cancelReservation(id){
  const resp = await fetch('/api/reservations/cancel',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({transaction_id:id})});
  const data = await resp.json();
  if(data.success){ syncToast(data.sync_toast); loadReservations(); loadNotifications(); }
}

async function extendReservation(id){
  const resp = await fetch('/api/reservations/extend',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({transaction_id:id})});
  const data = await resp.json();
  if(resp.ok){ syncToast(data.sync_toast); }
  else { syncToast(`Extend blocked: ${data.message}`); }
  loadReservations(); loadNotifications();
}

async function loadNotifications(){
  const notifs = await fetch(`/api/users/${STUDENT_ID}/notifications`).then(r=>r.json());
  const list = document.getElementById('notifList');
  list.innerHTML = '';
  notifs.forEach(n => list.insertAdjacentHTML('beforeend', `<li class="list-group-item">${n.message}<br><small>${n.timestamp}</small></li>`));
}

setInterval(loadNotifications, 5000);
Promise.all([loadReservations(), loadNotifications()]);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
